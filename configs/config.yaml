# @package _global_

# path to original working directory
# hydra hijacks working directory by changing it to the current log directory,
# so it's useful to have this path as a special variable
# learn more here: https://hydra.cc/docs/next/tutorials/basic/running_your_app/working_directory
work_dir: ${hydra:runtime.cwd}

io:
  input_filename: null
  input_dir: null
  output_dir: null
  # Spatial reference to use to override the one from input las.
  spatial_reference: EPSG:2154

tile_geometry:
  tile_coord_scale: 1000  # coords in tile names are in km
  tile_width: 1000
 
pretreatment: 
  filter:
    dimension: Classification
    keep_values: [1, 2, 3, 4, 5, 9, 66]   # Classes to keep 
  filter_date:
    deviation_days: 14
      # ISO-8601 UTC string corresponding to gpstime == 0.
      # Default matches the R reference: as.POSIXct("2011-09-14 01:46:40")
      # Override this value if your LiDAR data uses a different GPS time origin.
    gpstime_ref: "2011-09-14 01:46:40"
  filter_outlier:
    mean_k: 5
    multiplier: 10

dtm:
  download:
    resolution: 0.5 # Pixel size in metres
    dtm_layer : "IGNF_LIDAR-HD_MNT_ELEVATION.ELEVATIONGRIDCOVERAGE.LAMB93"
  output_subfolder: "DTM"

hydra:
  output_subdir: null
  run:
    dir: .